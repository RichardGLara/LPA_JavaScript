<!DOCTYPE html>
<html lang="Pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const number = Number(prompt("Insira um número:"));
        const number_post = number + 1 ;
        const number_ant = number - 1 ;
        alert(`Número: ${number}\nAnterior: ${number_ant}\nPosterior: ${number_post}`)
    </script>
</body>
</html>
