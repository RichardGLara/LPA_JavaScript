<!DOCTYPE html>
<html lang="Pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const valor = Number(prompt("Valor do consumo: "))
        const clientes = Number(prompt("Numero de clientes a pagar: "))
        const valor_cliente = valor / clientes
        alert(`Valor: ${valor}\nClientes: ${clientes}\nValor por cliente: ${valor_cliente}`)
    </script>
</body>
</html>
