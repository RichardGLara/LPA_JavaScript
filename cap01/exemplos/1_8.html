<!DOCTYPE html>
<html lang="Pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const dias = Number(prompt("Número de dias: "));
        const horas = Number(prompt("Número de horas: "));
        const total = ( dias * 24 ) + horas ;
        alert(`Dias: ${dias}\nHoras: ${horas}\nTOTAL: ${total} horas`);
    </script>
</body>
</html>
