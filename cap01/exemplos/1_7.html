<!DOCTYPE html>
<html lang="Pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const jantar = Number(prompt("Valor do jantar: "));
        const garcom = jantar * 0.1;
        const total = jantar + garcom;
        alert(`Jantar: ${jantar.toFixed(2)}\nGarçon: ${garcom.toFixed(2)}\nTOTAL: ${total.toFixed(2)}`)
    </script>
</body>
</html>
