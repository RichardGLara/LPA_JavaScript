    <title>Document</title>
</head>
<body>
    <script>
        const a = "20"                      //a = 20 (string)
        const b = a * 2 ;                   //b = 40 
        const c = a / 2 ;                   //c = 10
        const d = a - 2 ;                   //d = 18
        const e = a + 2 ;                   //e = 202 (???)
        const e_correct = Number(a) + 2 ;   //convertendo a string em Number()
        alert("a: " + a);                   //Exibe o valor de uma variável
        alert("b: " + b);                   //Exibe o valor de uma variável
        alert("c: " + c);                   //Exibe o valor de uma variável
        alert("d: " + d);                   //Exibe o valor de uma variável
        alert("e: " + e + "   (???)");      //Exibe o valor de uma variável
        alert(`e: ${e_correct}`);          //Exibe o valor de uma variável
    </script>
</body>
